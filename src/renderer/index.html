<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Pit Boss</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="flame">▲</span>
      <span class="brand-name">Pit Boss</span>
    </div>
    <div class="statusbar" id="statusbar">
      <span class="stat"><span class="led" id="ledFan"></span><span class="stat-label">Fan</span></span>
      <span class="stat"><span class="led" id="ledHot"></span><span class="stat-label">Ign</span></span>
      <span class="stat"><span class="led" id="ledMotor"></span><span class="stat-label">Aug</span></span>
      <span class="stat"><span class="led" id="ledModule"></span><span class="stat-label">Pwr</span></span>
    </div>
    <button id="connBtn" class="conn-pill" data-state="disconnected">
      <span class="dot"></span>
      <span id="connLabel">Disconnected</span>
    </button>
  </header>

  <!-- Global grill actions, always at the top -->
  <div class="toolbar" id="toolbar">
    <button id="offBtn" class="btn btn-danger" disabled>Turn Off</button>
    <button id="lightBtn" class="btn btn-ghost hidden">Light</button>
    <button id="primeBtn" class="btn btn-ghost">Prime</button>
    <button id="refreshBtn" class="btn btn-ghost">Refresh</button>
  </div>

  <!-- Live status line: grill lifecycle + surfaced notifications -->
  <div id="statusBar" class="status-bar level-off">Connecting…</div>

  <main id="app">
    <!-- Fault alert (only shown when the controller reports an error) -->
    <div id="errBanner" class="err-banner hidden"></div>

    <!-- Grill panel: controls + its own history chart + component activity -->
    <section class="card grill-card">
      <div class="card-head">
        <span class="card-title">Grill</span>
        <select id="cookSelect" class="cook-select" title="View a past cook">
          <option value="">● Live</option>
        </select>
      </div>
      <div class="bigtemp">
        <span id="grillTemp" class="bigtemp-value">--</span>
        <span class="bigtemp-unit" id="unit">°F</span>
      </div>
      <div class="set-line"><span id="grillSetLabel" class="set-label">— —</span></div>

      <div class="target-caption">Target °F</div>
      <div id="presets" class="presets"></div>

      <canvas id="grillChart" class="panel-canvas"></canvas>
      <div class="activity-wrap">
        <div class="activity-title">Component activity</div>
        <canvas id="activityChart" class="activity-canvas"></canvas>
      </div>

      <div class="pellet-gauge">
        <div class="pellet-head">
          <span class="pellet-label">Pellets <span class="pellet-note">est.</span></span>
          <span class="pellet-btns">
            <button id="refillBtn" class="pellet-btn" title="Tap after filling the hopper — resets the estimate to full">Refilled</button>
            <button id="emptiedBtn" class="pellet-btn" title="Tap after emptying the hopper — best practice to store pellets dry between cooks">Emptied</button>
          </span>
        </div>
        <div class="pellet-bar"><div class="pellet-fill ok" id="pelletFill"></div></div>
        <div class="pellet-sub" id="pelletSub">~-- %</div>
      </div>
    </section>

    <!-- One panel per probe (status + controls + its own chart), built by JS -->
    <div id="probePanels"></div>

  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="./renderer.js"></script>
</body>
</html>
